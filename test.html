<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>回溯填色算法 - 均匀分布连通版</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --node-bg: #ffffff; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .header { padding: 15px; text-align: center; color: #1e293b; }
        .main-container { display: flex; gap: 20px; padding: 0 20px 20px 20px; width: 95%; max-width: 1200px; height: calc(100vh - 100px); }

        /* 左侧控制面板 */
        .sidebar { background: white; width: 300px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .sidebar h3 { margin: 0; font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        select, button, input { padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0; outline: none; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background: #4338ca; }
        button:disabled { background: #94a3b8; }

        /* 统计数据展示 */
        .stat-box { background: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 13px; color: #475569; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .stat-item b { color: var(--primary); }

        /* 右侧画布 */
        .canvas-container { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; border: 1px solid #e2e8f0; }
        canvas { width: 100%; height: 100%; border-radius: 12px; }

        .legend { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-top: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:5px">地图填色算法可视化演示</h2>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>配置策略</h3>
        <label>选择剪枝策略:</label>
        <select id="strategy">
            <option value="basic">普通回溯 (按数字序号)</option>
            <option value="mrv">MRV (最少剩余值优先)</option>
            <option value="degree">度启发式 (最大度优先)</option>
            <option value="combined">组合优化 (MRV + 度数)</option>
        </select>

        <label>动画延迟 (ms):</label>
        <input type="range" id="speed" min="50" max="1000" value="400">

        <button id="btnGen">重新生成均匀地图</button>
        <button id="btnStart">开始回溯演示</button>
        <button id="btnReset" style="background:#64748b">清除颜色</button>

        <div class="stat-box">
            <div class="stat-item">状态: <span id="status">就绪</span></div>
            <div class="stat-item">递归次数: <b id="countCall">0</b></div>
            <div class="stat-item">回溯次数: <b id="countBack">0</b></div>
        </div>

        <div style="font-size: 12px; color: #94a3b8;">
            * 每个节点至少有一条边相连<br>
            * 序号 1,2,3... 标识节点身份
        </div>

        <div class="legend">
            颜色库:
            <div class="dot" style="background:#FF5E5E"></div>
            <div class="dot" style="background:#2ECC71"></div>
            <div class="dot" style="background:#3498DB"></div>
            <div class="dot" style="background:#F1C40F"></div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<script>
/**
 * 核心参数
 */
const COLORS = ["#FF5E5E", "#2ECC71", "#3498DB", "#F1C40F"];
const NODE_RADIUS = 22;
const MIN_DIST = 100; // 节点间的最小距离，防止重叠
const MAX_NODES = 9;  // 节点总数

let nodes = [];
let edges = [];
let adj = {}; 
let colorsAssigned = {}; 
let isRunning = false;
let callCount = 0;
let backtrackCount = 0;

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

/**
 * 均匀分布的地图生成逻辑
 */
function generateUniformMap() {
    nodes = [];
    edges = [];
    adj = {};
    colorsAssigned = {};
    
    const w = canvas.width;
    const h = canvas.height;
    const padding = 50;

    // 1. 尝试放置节点（距离校验）
    let attempts = 0;
    while (nodes.length < MAX_NODES && attempts < 1000) {
        let candidate = {
            x: padding + Math.random() * (w - padding * 2),
            y: padding + Math.random() * (h - padding * 2)
        };

        // 检查是否与已有节点太近
        let tooClose = nodes.some(n => Math.hypot(n.x - candidate.x, n.y - candidate.y) < MIN_DIST);
        
        if (!tooClose) {
            let id = nodes.length;
            nodes.push({
                id: id,
                label: id + 1,
                x: candidate.x,
                y: candidate.y,
                degree: 0
            });
            adj[id] = [];
        }
        attempts++;
    }

    // 2. 保证连通性：生成一条随机生成树
    let unvisited = [...nodes.slice(1)];
    let visited = [nodes[0]];
    
    while (unvisited.length > 0) {
        let uIdx = Math.floor(Math.random() * visited.length);
        let vIdx = Math.floor(Math.random() * unvisited.length);
        
        addEdge(visited[uIdx].id, unvisited[vIdx].id);
        
        visited.push(unvisited[vIdx]);
        unvisited.splice(vIdx, 1);
    }

    // 3. 额外增加几条边（模拟地图复杂性，但限制过长边）
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            let dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
            // 距离适中且不重复连边
            if (dist < MIN_DIST * 2 && !adj[i].includes(j) && Math.random() > 0.6) {
                addEdge(i, j);
            }
        }
    }

    resetUI();
    draw();
}

function addEdge(u, v) {
    edges.push([u, v]);
    adj[u].push(v);
    adj[v].push(u);
    nodes[u].degree++;
    nodes[v].degree++;
}

/**
 * 启发式剪枝逻辑
 */
function getLegalColorsCount(nodeId) {
    let forbidden = new Set();
    adj[nodeId].forEach(neighbor => {
        if (colorsAssigned[neighbor] !== undefined) forbidden.add(colorsAssigned[neighbor]);
    });
    return COLORS.length - forbidden.size;
}

function pickNextNode(unassigned, strategy) {
    if (strategy === 'basic') return unassigned[0];
    
    if (strategy === 'mrv') {
        return unassigned.reduce((a, b) => getLegalColorsCount(a) < getLegalColorsCount(b) ? a : b);
    }
    
    if (strategy === 'degree') {
        return unassigned.reduce((a, b) => nodes[a].degree > nodes[b].degree ? a : b);
    }

    if (strategy === 'combined') {
        let minRV = Math.min(...unassigned.map(id => getLegalColorsCount(id)));
        let candidates = unassigned.filter(id => getLegalColorsCount(id) === minRV);
        return candidates.reduce((a, b) => nodes[a].degree > nodes[b].degree ? a : b);
    }
}

/**
 * 回溯算法
 */
async function solve() {
    const strategy = document.getElementById('strategy').value;
    const unassigned = nodes.map(n => n.id).filter(id => colorsAssigned[id] === undefined);
    
    if (unassigned.length === 0) return true;

    callCount++;
    const nodeId = pickNextNode(unassigned, strategy);
    updateStats(`正在决策点: ${nodeId + 1}`);

    for (let c = 0; c < COLORS.length; c++) {
        // 基础剪枝：颜色合法性检查
        let canUse = true;
        for (let neighbor of adj[nodeId]) {
            if (colorsAssigned[neighbor] === c) {
                canUse = false; break;
            }
        }

        if (canUse) {
            colorsAssigned[nodeId] = c;
            draw(nodeId);
            await sleep();

            if (await solve()) return true;

            // 回退
            delete colorsAssigned[nodeId];
            backtrackCount++;
            draw(nodeId);
            updateStats(`回溯冲突!`);
            await sleep();
        }
    }
    return false;
}

/**
 * 绘图逻辑
 */
function draw(activeId = null) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制连线
    ctx.setLineDash([]);
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 3;
    edges.forEach(([u, v]) => {
        ctx.beginPath();
        ctx.moveTo(nodes[u].x, nodes[u].y);
        ctx.lineTo(nodes[v].x, nodes[v].y);
        ctx.stroke();
    });

    // 绘制节点
    nodes.forEach(node => {
        const isCurrent = activeId === node.id;
        
        // 绘制阴影（发光效果）
        if(isCurrent) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(79, 70, 229, 0.6)";
        } else {
            ctx.shadowBlur = 0;
        }

        ctx.beginPath();
        ctx.arc(node.x, node.y, NODE_RADIUS, 0, Math.PI * 2);
        
        // 填充颜色
        ctx.fillStyle = colorsAssigned[node.id] !== undefined ? COLORS[colorsAssigned[node.id]] : "#ffffff";
        ctx.fill();
        
        // 描边
        ctx.lineWidth = isCurrent ? 5 : 2;
        ctx.strokeStyle = isCurrent ? "#4f46e5" : "#334155";
        ctx.stroke();
        
        // 绘制数字序号
        ctx.shadowBlur = 0;
        ctx.fillStyle = colorsAssigned[node.id] !== undefined ? "#fff" : "#1e293b";
        ctx.font = "bold 18px Inter, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(node.label, node.x, node.y);

        // 辅助信息（度数和可选颜色数）
        ctx.font = "11px Arial";
        ctx.fillStyle = "#94a3b8";
        ctx.fillText(`D:${node.degree} R:${getLegalColorsCount(node.id)}`, node.x, node.y + 38);
    });
}

/**
 * 工具函数
 */
function sleep() {
    const ms = 1050 - document.getElementById('speed').value;
    return new Promise(r => setTimeout(r, ms));
}

function updateStats(statusText) {
    document.getElementById('countCall').innerText = callCount;
    document.getElementById('countBack').innerText = backtrackCount;
    document.getElementById('status').innerText = statusText;
}

function resetUI() {
    callCount = 0;
    backtrackCount = 0;
    updateStats("准备就绪");
}

function resize() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    draw();
}

// 初始化
window.addEventListener('resize', resize);
document.getElementById('btnGen').onclick = () => { if(!isRunning) generateUniformMap(); };
document.getElementById('btnReset').onclick = () => { 
    if(isRunning) return;
    colorsAssigned = {}; 
    resetUI(); 
    draw(); 
};
document.getElementById('btnStart').onclick = async () => {
    if (isRunning) return;
    isRunning = true;
    resetUI();
    document.getElementById('btnStart').disabled = true;
    
    const startTime = performance.now();
    const success = await solve();
    const endTime = performance.now();
    
    isRunning = false;
    document.getElementById('btnStart').disabled = false;
    updateStats(success ? `完成! (耗时 ${Math.round(endTime - startTime)}ms)` : "无解");
};

// 启动
resize();
generateUniformMap();
</script>
</body>
</html>
