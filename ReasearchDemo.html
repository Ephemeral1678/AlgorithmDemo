<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实验二：分治法求最近点对问题</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --surface2: #1a2332;
      --border: #1e3a5f;
      --border2: #2d4a6f;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --green: #22c55e;
      --green2: #4ade80;
      --red: #ef4444;
      --orange: #f59e0b;
      --purple: #a855f7;
      --cyan: #06b6d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
      line-height: 1.6;
    }
    ::selection { background: rgba(59,130,246,0.3); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Top Nav */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(11,17,32,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; height: 52px;
    }
    .top-nav .logo {
      font-size: 15px; font-weight: 700; color: var(--accent2);
      margin-right: 32px; white-space: nowrap;
    }
    .nav-links { display: flex; gap: 4px; overflow-x: auto; }
    .nav-links a {
      color: var(--text2); text-decoration: none; font-size: 13px;
      padding: 6px 14px; border-radius: 6px; white-space: nowrap;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent2); background: rgba(59,130,246,0.1);
    }

    /* Sections */
    .section {
      max-width: 1100px; margin: 0 auto; padding: 80px 24px 40px;
    }
    .section-title {
      font-size: 26px; font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-title .num {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: white; width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
    }
    .section-subtitle {
      color: var(--text2); font-size: 15px; margin-bottom: 28px;
      padding-left: 48px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-header {
      font-size: 16px; font-weight: 600; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-header .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* Hero */
    .hero {
      text-align: center; padding: 120px 24px 60px;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 60%);
    }
    .hero h1 {
      font-size: 36px; font-weight: 800;
      background: linear-gradient(135deg, #e2e8f0, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .hero .meta {
      color: var(--text3); font-size: 14px; margin-bottom: 24px;
    }
    .hero .tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .hero .tag {
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border);
      background: rgba(30,58,95,0.3);
      color: var(--text2);
    }

    /* Demo Controls */
    .demo-controls {
      display: flex; justify-content: center; align-items: center;
      gap: 10px; margin-top: 16px; flex-wrap: wrap;
    }
    .demo-btn {
      padding: 8px 18px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .demo-btn:hover:not(:disabled) {
      border-color: var(--accent); color: var(--accent2);
      background: rgba(59,130,246,0.1);
    }
    .demo-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .demo-btn.primary {
      background: rgba(59,130,246,0.15); border-color: var(--accent);
      color: var(--accent2); min-width: 110;
    }
    .demo-btn.danger {
      background: rgba(239,68,68,0.15); border-color: var(--red);
      color: #fca5a5;
    }

    /* Mode Switch */
    .mode-switch {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;
    }
    .mode-btn {
      padding: 10px 24px; border-radius: 8px; border: 2px solid var(--border);
      background: var(--surface); color: var(--text2);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; font-family: inherit;
    }
    .mode-btn.active-divide {
      border-color: var(--accent); background: rgba(59,130,246,0.15);
      color: var(--accent2); box-shadow: 0 0 20px rgba(59,130,246,0.1);
    }
    .mode-btn.active-brute {
      border-color: var(--red); background: rgba(239,68,68,0.15);
      color: #fca5a5; box-shadow: 0 0 20px rgba(239,68,68,0.1);
    }

    /* Flex layouts */
    .flex-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .flex-row > * { flex: 1; min-width: 320px; }

    /* Info box */
    .info-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-top: 12px;
    }
    .call-stack {
      background: var(--bg); border-radius: 6px; padding: 8px 12px;
      margin-top: 8px; font-family: 'Consolas', monospace;
      font-size: 12px; color: var(--accent2);
    }

    /* Table */
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .data-table th {
      background: var(--surface2); color: var(--accent2);
      padding: 10px 14px; text-align: left; font-weight: 600;
      border-bottom: 2px solid var(--border);
    }
    .data-table td {
      padding: 9px 14px; border-bottom: 1px solid rgba(30,58,95,0.4);
      color: var(--text2);
    }
    .data-table tr:hover td { background: rgba(59,130,246,0.04); }

    /* Progress */
    .progress-bar {
      height: 4px; background: var(--surface2); border-radius: 2px;
      overflow: hidden; flex: 1;
    }
    .progress-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
    }

    /* Phase badge */
    .phase-badge {
      padding: 3px 12px; border-radius: 12px; font-size: 11px;
      font-weight: 700; display: inline-block;
    }

    /* Code block */
    .code-panel {
      background: var(--bg); border-radius: 10px;
      border: 1px solid var(--border);
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px; line-height: 21px;
      overflow: auto; max-height: 380px;
    }
    .code-panel-header {
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      color: var(--text3); font-size: 11px; font-family: inherit;
      display: flex; align-items: center; gap: 8px;
    }
    .code-panel-header .dot-row { display: flex; gap: 5px; }
    .code-panel-header .wdot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .code-line {
      padding: 1px 14px 1px 8px; display: flex;
      transition: background 0.3s, border-color 0.3s;
      border-left: 3px solid transparent;
    }
    .code-line.hl {
      background: rgba(59,130,246,0.15);
      border-left-color: var(--accent);
    }
    .code-line .ln {
      color: var(--text3); width: 28px; text-align: right;
      margin-right: 14px; user-select: none; flex-shrink: 0;
    }
    .code-line .ct { white-space: pre; }
    .code-line.hl .ct { color: #f1f5f9; }
    .code-line:not(.hl) .ct { color: #4b5e7e; }

    /* Anchor offset */
    [id] { scroll-margin-top: 64px; }

    @media (max-width: 700px) {
      .hero h1 { font-size: 24px; }
      .section-title { font-size: 20px; }
      .top-nav .logo { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ========== 共享数据 ========== */
const POINTS = [
  { x: 2, y: 3, id: 0 },
  { x: 3, y: 7, id: 1 },
  { x: 5, y: 1, id: 2 },
  { x: 6, y: 5, id: 3 },
  { x: 8, y: 6, id: 4 },
  { x: 9, y: 2, id: 5 },
];

/* ========== 分治法代码与步骤 ========== */
const DC_CODE = [
  `Result closestPairRec(Point px[], int left, int right) {`,
  `    // 基准情形：点数 <= 3 时用蛮力法`,
  `    if (right - left + 1 <= 3) {`,
  `        return bruteForce(px, left, right);`,
  `    }`,
  `    // ---- 分 (Divide) ----`,
  `    int mid = (left + right) / 2;`,
  `    double midX = px[mid].x;`,
  `    // ---- 治 (Conquer) ----`,
  `    Result leftRes  = closestPairRec(px, left, mid);`,
  `    Result rightRes = closestPairRec(px, mid+1, right);`,
  `    // 取左右两边较小的距离`,
  `    double d = min(leftRes.minDist, rightRes.minDist);`,
  `    // ---- 合并 (Combine) ----`,
  `    // 构建带状区域 |x - midX| < d`,
  `    vector<Point> strip;`,
  `    for (int i = left; i <= right; i++)`,
  `        if (fabs(px[i].x - midX) < d) strip.push_back(px[i]);`,
  `    // 在strip中查找更近的点对`,
  `    for (int i = 0; i < strip.size(); i++)`,
  `      for (int j = i+1; j < strip.size()`,
  `           && strip[j].y - strip[i].y < d; j++)`,
  `        d = min(d, dist(strip[i], strip[j]));`,
  `    return Result(d, bestP1, bestP2);`,
  `}`,
];

const DC_STEPS = [
  { title:"初始状态：6个点按X坐标排序", desc:"输入6个平面上的点，已按x坐标排序。目标：找到距离最近的一对点。", hl:[0], active:[0,1,2,3,4,5], left:null, right:null, mid:null, strip:null, pairs:[], best:null, stack:["closestPairRec(px, 0, 5)"], phase:"init" },
  { title:"第一层递归：检查基准情形", desc:"n=6 > 3，不满足基准情形，需要继续分治。", hl:[2], active:[0,1,2,3,4,5], left:null, right:null, mid:null, strip:null, pairs:[], best:null, stack:["closestPairRec(px, 0, 5)"], phase:"check" },
  { title:"分 (Divide)：从中间划分", desc:"mid=(0+5)/2=2, midX=px[2].x=5。分为左半{P0,P1,P2}和右半{P3,P4,P5}。", hl:[5,6,7], active:[0,1,2,3,4,5], left:[0,1,2], right:[3,4,5], mid:5, strip:null, pairs:[], best:null, stack:["closestPairRec(px, 0, 5)"], phase:"divide" },
  { title:"治 (Conquer)：递归左半部分", desc:"递归 closestPairRec(px, 0, 2)，左半只有3个点，满足基准情形，用蛮力法。", hl:[1,2,3], active:[0,1,2], left:[0,1,2], right:null, mid:5, strip:null, pairs:[], best:null, stack:["closestPairRec(px, 0, 5)","  closestPairRec(px, 0, 2)"], phase:"left" },
  { title:"蛮力法：枚举左半所有点对", desc:"P0-P1: 4.12, P0-P2: 3.61, P1-P2: 6.32 → dL = 3.61 (P0, P2)", hl:[3], active:[0,1,2], left:[0,1,2], right:null, mid:5, strip:null, pairs:[[0,1],[0,2],[1,2]], best:[0,2], stack:["closestPairRec(px, 0, 5)","  closestPairRec(px, 0, 2) → dL=3.61"], phase:"left" },
  { title:"治 (Conquer)：递归右半部分", desc:"递归 closestPairRec(px, 3, 5)，右半3个点，用蛮力法。", hl:[1,2,3], active:[3,4,5], left:null, right:[3,4,5], mid:5, strip:null, pairs:[], best:[0,2], stack:["closestPairRec(px, 0, 5)","  closestPairRec(px, 3, 5)"], phase:"right" },
  { title:"蛮力法：枚举右半所有点对", desc:"P3-P4: 2.24, P3-P5: 4.24, P4-P5: 4.12 → dR = 2.24 (P3, P4)", hl:[3], active:[3,4,5], left:null, right:[3,4,5], mid:5, strip:null, pairs:[[3,4],[3,5],[4,5]], best:[3,4], stack:["closestPairRec(px, 0, 5)","  closestPairRec(px, 3, 5) → dR=2.24"], phase:"right" },
  { title:"回到第一层：取左右最小值", desc:"d = min(dL, dR) = min(3.61, 2.24) = 2.24。但还需检查跨越中线的点对！", hl:[11,12], active:[0,1,2,3,4,5], left:[0,1,2], right:[3,4,5], mid:5, strip:null, pairs:[], best:[3,4], stack:["closestPairRec(px, 0, 5)  d=2.24"], phase:"merge" },
  { title:"合并 (Combine)：构建带状区域", desc:"|x-5|<2.24 → x∈(2.76, 7.24)，Strip = {P1(3,7), P2(5,1), P3(6,5)}", hl:[13,14,15,16,17], active:[0,1,2,3,4,5], left:[0,1,2], right:[3,4,5], mid:5, strip:[1,2,3], pairs:[], best:[3,4], stack:["closestPairRec(px, 0, 5)  strip={P1,P2,P3}"], phase:"strip" },
  { title:"在Strip中查找更近的点对", desc:"检查 strip 内点对，P2-P3: 5.0, P1-P3: 3.61，均 > 2.24，无更新。", hl:[18,19,20,21], active:[0,1,2,3,4,5], left:[0,1,2], right:[3,4,5], mid:5, strip:[1,2,3], pairs:[[2,3],[1,3]], best:[3,4], stack:["checking strip..."], phase:"strip" },
  { title:"返回最终结果 ✓", desc:"最近点对：P3(6,5) ↔ P4(8,6)，距离 d = 2.24", hl:[22], active:[0,1,2,3,4,5], left:null, right:null, mid:null, strip:null, pairs:[], best:[3,4], stack:["return Result(d=2.24, P3, P4)"], phase:"done" },
];

/* ========== 蛮力法代码与步骤 ========== */
const BF_CODE = [
  `Result bruteForce(Point p[], int n) {`,
  `    double minDist = INF;`,
  `    int p1 = -1, p2 = -1;`,
  `    // 枚举所有 i < j 的点对`,
  `    for (int i = 0; i < n; i++) {`,
  `        for (int j = i + 1; j < n; j++) {`,
  `            double d = dist(p[i], p[j]);`,
  `            if (d < minDist) {`,
  `                minDist = d;`,
  `                p1 = i;  p2 = j;`,
  `            }`,
  `        }`,
  `    }`,
  `    return Result(minDist, p[p1], p[p2]);`,
  `}`,
];

const pairsList = [];
for(let i=0;i<6;i++) for(let j=i+1;j<6;j++) pairsList.push([i,j]);
const dists = {};
pairsList.forEach(([a,b]) => {
  dists[`${a}-${b}`] = Math.sqrt((POINTS[a].x-POINTS[b].x)**2+(POINTS[a].y-POINTS[b].y)**2).toFixed(2);
});

const BF_STEPS = [
  { title:"蛮力法：初始状态", desc:`枚举所有C(6,2)=15对点，逐一计算距离。`, hl:[0,1,2,3], active:[0,1,2,3,4,5], pairs:[], best:null, stack:["bruteForce(points, 6)  minDist=∞"], phase:"init" },
];
let curBest = null; let curMin = Infinity;
pairsList.forEach(([a,b], idx) => {
  const d = parseFloat(dists[`${a}-${b}`]);
  const updated = d < curMin;
  if(updated) { curMin = d; curBest = [a,b]; }
  BF_STEPS.push({
    title: `比较 P${a} ↔ P${b}${updated ? ' 🎯' : ''}`,
    desc: `距离=${dists[`${a}-${b}`]}${updated ? ` → 更新最小值！minDist=${curMin}` : ` → 不更新 (>${curMin})`}`,
    hl: updated ? [4,5,6,7,8,9,10] : [4,5,6],
    active:[0,1,2,3,4,5], pairs:[[a,b]], best: curBest ? [...curBest] : null,
    stack:[`比较 i=${a}, j=${b}  d=${dists[`${a}-${b}`]}  minDist=${curMin}`],
    phase:"check"
  });
});
BF_STEPS.push({ title:"蛮力法结束 ✓", desc:`遍历完所有15对。最近点对：P3(6,5) ↔ P4(8,6)，距离=2.24`, hl:[13], active:[0,1,2,3,4,5], pairs:[], best:[3,4], stack:["return Result(2.24, P3, P4)"], phase:"done" });


/* ========== 画布组件 ========== */
function Canvas({ s, isBrute, width }) {
  const W = width || 460, H = W * 0.75;
  const pad = 40;
  const sx = (x) => pad + (x/11)*(W-2*pad);
  const sy = (y) => H - pad - (y/9)*(H-2*pad);

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{borderRadius:10,display:'block',maxWidth:'100%'}}>
      <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0c1425"/>
          <stop offset="100%" stopColor="#080e1a"/>
        </linearGradient>
      </defs>
      <rect width={W} height={H} fill="url(#bgGrad)" rx={10}/>
      {/* Grid */}
      {[0,2,4,6,8,10].map(v=><g key={v}>
        <line x1={sx(v)} y1={pad-5} x2={sx(v)} y2={H-pad+5} stroke="#152238" strokeWidth={1}/>
        <text x={sx(v)} y={H-pad+18} fill="#3a4d6b" fontSize={9} textAnchor="middle">{v}</text>
      </g>)}
      {[0,2,4,6,8].map(v=><g key={v}>
        <line x1={pad-5} y1={sy(v)} x2={W-pad+5} y2={sy(v)} stroke="#152238" strokeWidth={1}/>
        <text x={pad-14} y={sy(v)+3} fill="#3a4d6b" fontSize={9} textAnchor="middle">{v}</text>
      </g>)}

      {/* Regions */}
      {!isBrute && s.left && <rect x={sx(0.5)} y={pad-10} width={sx(5)-sx(0.5)} height={H-2*pad+20} fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.25)" strokeWidth={1} strokeDasharray="5,4" rx={6}/>}
      {!isBrute && s.right && <rect x={sx(5)} y={pad-10} width={sx(10.5)-sx(5)} height={H-2*pad+20} fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.25)" strokeWidth={1} strokeDasharray="5,4" rx={6}/>}
      {!isBrute && s.strip && s.mid && <rect x={sx(s.mid-2.24)} y={pad-10} width={sx(s.mid+2.24)-sx(s.mid-2.24)} height={H-2*pad+20} fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.4)" strokeWidth={1.5} strokeDasharray="6,3" rx={6}/>}
      {!isBrute && s.mid!==null && <line x1={sx(s.mid)} y1={pad-10} x2={sx(s.mid)} y2={H-pad+10} stroke="#22c55e" strokeWidth={1.5} strokeDasharray="8,5" opacity={0.6}/>}

      {/* Pair lines */}
      {s.pairs.map(([a,b],i)=>{
        const isBest = s.best && a===s.best[0] && b===s.best[1];
        return <line key={i} x1={sx(POINTS[a].x)} y1={sy(POINTS[a].y)} x2={sx(POINTS[b].x)} y2={sy(POINTS[b].y)} stroke={isBest?"#22c55e":"#3a5070"} strokeWidth={isBest?2.5:1.5} strokeDasharray={isBest?"0":"4,4"} opacity={isBest?1:0.5}/>;
      })}
      {s.best && s.pairs.length===0 && <line x1={sx(POINTS[s.best[0]].x)} y1={sy(POINTS[s.best[0]].y)} x2={sx(POINTS[s.best[1]].x)} y2={sy(POINTS[s.best[1]].y)} stroke="#22c55e" strokeWidth={2.5}/>}

      {/* Points */}
      {POINTS.map((p,i)=>{
        const active = s.active.includes(i);
        const inStrip = !isBrute && s.strip && s.strip.includes(i);
        const isBest = s.best && (i===s.best[0]||i===s.best[1]);
        const inL = !isBrute && s.left && s.left.includes(i);
        const inR = !isBrute && s.right && s.right.includes(i);
        let fill="#3a5070", r=5, stk="none", sw=0;
        if(active)fill="#7a8ba8";
        if(inL)fill="#3b82f6";
        if(inR)fill="#a855f7";
        if(inStrip){fill="#f59e0b";r=6;}
        if(isBest){fill="#22c55e";r=8;stk="#86efac";sw=2;}
        return <g key={i}>
          {isBest && <circle cx={sx(p.x)} cy={sy(p.y)} r={14} fill="none" stroke="#22c55e" strokeWidth={1} opacity={0.3}/>}
          <circle cx={sx(p.x)} cy={sy(p.y)} r={r} fill={fill} stroke={stk} strokeWidth={sw} opacity={active?1:0.2}/>
          <text x={sx(p.x)} y={sy(p.y)-12} fill={active?"#cbd5e1":"#2d3f5a"} fontSize={10} fontWeight="600" textAnchor="middle">P{i}({p.x},{p.y})</text>
        </g>;
      })}

      {/* Labels */}
      {!isBrute && s.left && <text x={sx(2.5)} y={pad+2} fill="#3b82f6" fontSize={10} fontWeight="bold" textAnchor="middle">左半部分</text>}
      {!isBrute && s.right && <text x={sx(7.5)} y={pad+2} fill="#a855f7" fontSize={10} fontWeight="bold" textAnchor="middle">右半部分</text>}
      {!isBrute && s.mid!==null && <text x={sx(s.mid)+4} y={pad+14} fill="#4ade80" fontSize={9} fontWeight="bold">mid={s.mid}</text>}
      {!isBrute && s.strip && <text x={sx(s.mid)} y={H-pad+32} fill="#f59e0b" fontSize={9} fontWeight="bold" textAnchor="middle">Strip 带状区域</text>}
    </svg>
  );
}

/* ========== 动画播放器 ========== */
function AlgoPlayer({ mode }) {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const isBrute = mode === 'brute';
  const stepsData = isBrute ? BF_STEPS : DC_STEPS;
  const code = isBrute ? BF_CODE : DC_CODE;
  const s = stepsData[step];
  const speed = isBrute ? 800 : 2200;

  useEffect(()=>{ setStep(0); setPlaying(false); },[mode]);
  useEffect(()=>{
    if(!playing||step>=stepsData.length-1){if(step>=stepsData.length-1)setPlaying(false);return;}
    const t=setTimeout(()=>setStep(p=>p+1),speed);
    return ()=>clearTimeout(t);
  },[playing,step,mode]);

  const phaseColor = {init:'#3b82f6',check:'#f59e0b',divide:'#22c55e',left:'#3b82f6',right:'#a855f7',merge:'#f59e0b',strip:'#f59e0b',done:'#22c55e'};
  const phaseLabel = {init:'初始化',check:isBrute?'逐一比较':'条件检查',divide:'分 Divide',left:'治 左半',right:'治 右半',merge:'合并',strip:'合并 Strip',done:'✓ 完成'};
  const pc = phaseColor[s.phase]||'#3b82f6';

  return (
    <div>
      {/* Progress */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span style={{color:'var(--text3)',fontSize:12,whiteSpace:'nowrap'}}>
          {step+1} / {stepsData.length}
        </span>
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${(step+1)/stepsData.length*100}%`}}/>
        </div>
        <span className="phase-badge" style={{background:pc+'18',color:pc,border:`1px solid ${pc}44`}}>
          {phaseLabel[s.phase]}
        </span>
      </div>

      {/* Code + Canvas */}
      <div className="flex-row">
        <div><CodePanel code={code} hl={s.hl} label={isBrute?'brute_force.cpp':'divide_conquer.cpp'}/></div>
        <div style={{display:'flex',justifyContent:'center',alignItems:'flex-start'}}>
          <Canvas s={s} isBrute={isBrute} width={460}/>
        </div>
      </div>

      {/* Info */}
      <div className="info-box">
        <h3 style={{fontSize:15,fontWeight:600,marginBottom:6}}>{s.title}</h3>
        <p style={{color:'var(--text2)',fontSize:13,lineHeight:'20px'}}>{s.desc}</p>
        <div style={{marginTop:10}}>
          <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>调用栈</span>
          <div className="call-stack">
            {s.stack.map((c,i)=><div key={i}>{c}</div>)}
          </div>
        </div>
      </div>

      {/* Controls */}
      <div className="demo-controls">
        <button className="demo-btn" onClick={()=>{setStep(0);setPlaying(false);}} disabled={step===0}>⏮ 重置</button>
        <button className="demo-btn" onClick={()=>{setStep(Math.max(0,step-1));setPlaying(false);}} disabled={step===0}>◀ 上一步</button>
        <button className={`demo-btn ${playing?'danger':'primary'}`} onClick={()=>setPlaying(!playing)}>
          {playing?'⏸ 暂停':'▶ 播放'}
        </button>
        <button className="demo-btn" onClick={()=>{setStep(Math.min(stepsData.length-1,step+1));setPlaying(false);}} disabled={step===stepsData.length-1}>下一步 ▶</button>
        <button className="demo-btn" onClick={()=>{setStep(stepsData.length-1);setPlaying(false);}} disabled={step===stepsData.length-1}>⏭ 结果</button>
      </div>
    </div>
  );
}

/* ========== 鸽巢原理示意图 ========== */
function PigeonholeDiagram() {
  const W=540, H=380, pad=30;
  const d = 160; // d 的视觉大小
  const cx = W/2, baseY = 60;
  // 2d x d 的矩形，分成 8 个 d/2 x d/2 的格子 (实际是 6 个格子在 strip 中)
  const cellW = d/2, cellH = d/2;
  const stripX = cx - d; // strip 宽 2d
  const stripY = baseY + 40;
  const cols = 4, rows = 2;

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',maxWidth:'100%'}}>
      <defs>
        <linearGradient id="pgBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0c1425"/>
          <stop offset="100%" stopColor="#080e1a"/>
        </linearGradient>
      </defs>
      <rect width={W} height={H} fill="url(#pgBg)" rx={10}/>

      {/* Title */}
      <text x={W/2} y={28} fill="#e2e8f0" fontSize={14} fontWeight="700" textAnchor="middle">鸽巢原理（Pigeonhole Principle）：Strip 中最多检查 7 个点</text>

      {/* 中线 */}
      <line x1={cx} y1={stripY-10} x2={cx} y2={stripY+rows*cellH+10} stroke="#22c55e" strokeWidth={2} strokeDasharray="6,4" opacity={0.7}/>
      <text x={cx} y={stripY-15} fill="#4ade80" fontSize={10} fontWeight="bold" textAnchor="middle">中线 midX</text>

      {/* Strip 区域 */}
      <rect x={stripX} y={stripY} width={cols*cellW} height={rows*cellH} fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.3)" strokeWidth={1.5} rx={4}/>

      {/* 标注 2d */}
      <line x1={stripX} y1={stripY+rows*cellH+20} x2={stripX+cols*cellW} y2={stripY+rows*cellH+20} stroke="#f59e0b" strokeWidth={1.5} markerEnd="none"/>
      <line x1={stripX} y1={stripY+rows*cellH+15} x2={stripX} y2={stripY+rows*cellH+25} stroke="#f59e0b" strokeWidth={1}/>
      <line x1={stripX+cols*cellW} y1={stripY+rows*cellH+15} x2={stripX+cols*cellW} y2={stripY+rows*cellH+25} stroke="#f59e0b" strokeWidth={1}/>
      <text x={cx} y={stripY+rows*cellH+35} fill="#f59e0b" fontSize={11} fontWeight="bold" textAnchor="middle">2d</text>

      {/* 标注 d (高度) */}
      <line x1={stripX-20} y1={stripY} x2={stripX-20} y2={stripY+rows*cellH} stroke="#3b82f6" strokeWidth={1.5}/>
      <line x1={stripX-25} y1={stripY} x2={stripX-15} y2={stripY} stroke="#3b82f6" strokeWidth={1}/>
      <line x1={stripX-25} y1={stripY+rows*cellH} x2={stripX-15} y2={stripY+rows*cellH} stroke="#3b82f6" strokeWidth={1}/>
      <text x={stripX-28} y={stripY+rows*cellH/2+4} fill="#60a5fa" fontSize={11} fontWeight="bold" textAnchor="middle" transform={`rotate(-90,${stripX-28},${stripY+rows*cellH/2+4})`}>d</text>

      {/* 格子 */}
      {Array.from({length:cols}).map((_,c)=>
        Array.from({length:rows}).map((_,r)=>{
          const gx = stripX+c*cellW, gy = stripY+r*cellH;
          return <g key={`${c}-${r}`}>
            <rect x={gx} y={gy} width={cellW} height={cellH} fill="none" stroke="rgba(100,116,139,0.3)" strokeWidth={1} strokeDasharray="3,3"/>
            <text x={gx+cellW/2} y={gy+cellH/2+3} fill="#334155" fontSize={9} textAnchor="middle">d/2 × d/2</text>
          </g>;
        })
      )}

      {/* 左半 右半 标签 */}
      <text x={cx-d/2} y={stripY+rows*cellH+50} fill="#3b82f6" fontSize={10} textAnchor="middle">左半 (≤d)</text>
      <text x={cx+d/2} y={stripY+rows*cellH+50} fill="#a855f7" fontSize={10} textAnchor="middle">右半 (≤d)</text>

      {/* 当前点 p */}
      <circle cx={cx-d/4} cy={stripY+cellH+cellH/3} r={7} fill="#22c55e" stroke="#86efac" strokeWidth={2}/>
      <text x={cx-d/4} y={stripY+cellH+cellH/3-12} fill="#4ade80" fontSize={10} fontWeight="bold" textAnchor="middle">p</text>

      {/* 其他可能的点 */}
      {[
        {x:cx+d/4, y:stripY+cellH/3, label:'q1'},
        {x:cx-d*0.15, y:stripY+cellH*0.7, label:'q2'},
        {x:cx+d*0.4, y:stripY+cellH+cellH/4, label:'q3'},
        {x:cx-d*0.35, y:stripY+cellH/2, label:'q4'},
        {x:cx+d/8, y:stripY+cellH+cellH*0.6, label:'q5'},
        {x:cx+d*0.3, y:stripY+cellH*0.5, label:'q6'},
        {x:cx-d*0.1, y:stripY+cellH+cellH*0.5, label:'q7'},
      ].map((q,i)=>(
        <g key={i}>
          <line x1={cx-d/4} y1={stripY+cellH+cellH/3} x2={q.x} y2={q.y} stroke="#334155" strokeWidth={0.8} strokeDasharray="3,3"/>
          <circle cx={q.x} cy={q.y} r={5} fill="#64748b" stroke="#94a3b8" strokeWidth={1}/>
          <text x={q.x+8} y={q.y+3} fill="#94a3b8" fontSize={8}>{q.label}</text>
        </g>
      ))}

      {/* 说明文字 */}
      <text x={W/2} y={stripY+rows*cellH+75} fill="#94a3b8" fontSize={11} textAnchor="middle">
        每个 d/2 × d/2 格子中最多 1 个点（否则该侧距离 &lt; d，矛盾）
      </text>
      <text x={W/2} y={stripY+rows*cellH+93} fill="#94a3b8" fontSize={11} textAnchor="middle">
        2×4 = 8 个格子，除去 p 自身所在格子 → 最多检查 7 个点
      </text>
      <text x={W/2} y={stripY+rows*cellH+115} fill="#60a5fa" fontSize={12} fontWeight="bold" textAnchor="middle">
        ∴ Strip 合并阶段时间复杂度 = O(n)，而非 O(n²)
      </text>
    </svg>
  );
}

/* ========== 复杂度对比图表 ========== */
function ComplexityChart() {
  const W=580, H=340, pad=55;
  const maxN = 50, maxY = 2600;
  const sx = n => pad + (n/maxN)*(W-2*pad);
  const sy = v => H - pad - (v/maxY)*(H-2*pad);

  // 生成数据点
  const ns = Array.from({length:50},(_,i)=>i+1);
  const bruteData = ns.map(n=>({n, v:n*n}));
  const dcData = ns.map(n=>({n, v: n<=1 ? 0 : n*Math.log2(n)}));
  const linearData = ns.map(n=>({n, v:n}));

  const makePath = (data) => data.map((d,i)=>`${i===0?'M':'L'}${sx(d.n).toFixed(1)},${sy(d.v).toFixed(1)}`).join(' ');

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',maxWidth:'100%'}}>
      <defs>
        <linearGradient id="chBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0c1425"/>
          <stop offset="100%" stopColor="#080e1a"/>
        </linearGradient>
      </defs>
      <rect width={W} height={H} fill="url(#chBg)" rx={10}/>

      {/* Grid */}
      {[0,10,20,30,40,50].map(n=><g key={n}>
        <line x1={sx(n)} y1={pad} x2={sx(n)} y2={H-pad} stroke="#152238" strokeWidth={1}/>
        <text x={sx(n)} y={H-pad+16} fill="#3a4d6b" fontSize={9} textAnchor="middle">{n}</text>
      </g>)}
      {[0,500,1000,1500,2000,2500].map(v=><g key={v}>
        <line x1={pad} y1={sy(v)} x2={W-pad} y2={sy(v)} stroke="#152238" strokeWidth={1}/>
        <text x={pad-8} y={sy(v)+3} fill="#3a4d6b" fontSize={9} textAnchor="end">{v}</text>
      </g>)}

      {/* Curves */}
      <path d={makePath(bruteData)} fill="none" stroke="#ef4444" strokeWidth={2.5} opacity={0.9}/>
      <path d={makePath(dcData)} fill="none" stroke="#3b82f6" strokeWidth={2.5} opacity={0.9}/>
      <path d={makePath(linearData)} fill="none" stroke="#22c55e" strokeWidth={1.5} strokeDasharray="6,4" opacity={0.6}/>

      {/* Labels */}
      <text x={W/2} y={24} fill="#e2e8f0" fontSize={13} fontWeight="700" textAnchor="middle">算法时间复杂度增长对比</text>
      <text x={W/2} y={H-8} fill="#3a4d6b" fontSize={10} textAnchor="middle">n（点的数量）</text>
      <text x={12} y={H/2} fill="#3a4d6b" fontSize={10} textAnchor="middle" transform={`rotate(-90,12,${H/2})`}>操作次数</text>

      {/* Legend */}
      <g transform={`translate(${pad+10}, ${pad+10})`}>
        <rect width={170} height={70} fill="rgba(11,17,32,0.8)" stroke="#1e3a5f" rx={6}/>
        <line x1={12} y1={18} x2={35} y2={18} stroke="#ef4444" strokeWidth={2.5}/>
        <text x={42} y={22} fill="#fca5a5" fontSize={11}>O(n²) 蛮力法</text>
        <line x1={12} y1={38} x2={35} y2={38} stroke="#3b82f6" strokeWidth={2.5}/>
        <text x={42} y={42} fill="#93c5fd" fontSize={11}>O(n log n) 分治法</text>
        <line x1={12} y1={58} x2={35} y2={58} stroke="#22c55e" strokeWidth={1.5} strokeDasharray="4,3"/>
        <text x={42} y={62} fill="#86efac" fontSize={11}>O(n) 线性参考</text>
      </g>

      {/* Annotations */}
      <text x={sx(45)+5} y={sy(45*45)-5} fill="#fca5a5" fontSize={10} fontWeight="bold">n²</text>
      <text x={sx(48)+5} y={sy(48*Math.log2(48))-5} fill="#93c5fd" fontSize={10} fontWeight="bold">n log n</text>
    </svg>
  );
}

            {id:'demo',label:'动态演示'},
            {id:'pigeonhole',label:'鸽巢原理'},
            {id:'complexity',label:'复杂度分析'},
            {id:'summary',label:'实验总结'},
          ].map(item=>(
            <a key={item.id} href={`#${item.id}`} className={activeNav===item.id?'active':''}>{item.label}</a>
          ))}
        </div>
      </nav>

      {/* Hero */}
      <div className="hero" id="overview">
        <h1>分治法求最近点对问题</h1>
        <div className="meta">实验二 · 算法设计与分析</div>
        <div className="tags">
          <span className="tag">分治法</span>
          <span className="tag">蛮力法</span>
          <span className="tag">最近点对</span>
          <span className="tag">O(n log n)</span>
          <span className="tag">鸽巢原理</span>
        </div>
      </div>

      {/* Section 1: 实验概述 */}
      <div className="section">
        <div className="section-title"><span className="num">1</span>实验概述</div>
        <div className="section-subtitle">实验目的与内容</div>
        <div className="flex-row">
          <div className="card">
            <div className="card-header"><div className="dot" style={{background:'#22c55e'}}/>实验目的</div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:'24px'}}>
              <p>1. 掌握分治法（Divide and Conquer）思想</p>
              <p>2. 学会最近点对问题的求解方法</p>
              <p>3. 理解鸽巢原理在算法优化中的应用</p>
              <p>4. 比较蛮力法与分治法的效率差异</p>
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="dot" style={{background:'#3b82f6'}}/>实验内容</div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:'24px'}}>
              <p>1. 随机生成N个点的平面坐标</p>
              <p>2. 蛮力法计算所有点对最短距离</p>
              <p>3. 分治法计算最近点对</p>
              <p>4. N=100,000~1,000,000 性能对比</p>
              <p>5. 图形界面可视化算法过程</p>
            </div>
          </div>
        </div>
      </div>

      {/* Section 2: 算法原理 */}
      <div className="section" id="algorithm">
        <div className="section-title"><span className="num">2</span>算法原理</div>
        <div className="section-subtitle">蛮力法 vs 分治法的核心思路对比</div>
        <AlgoCompareCards/>
        <div style={{marginTop:20}}>
          <div className="card">
            <div className="card-header"><div className="dot" style={{background:'#22c55e'}}/>分治法三步骤</div>
            <div style={{display:'flex',justifyContent:'center',paddingTop:8}}>
              <DivideConquerFlow/>
            </div>
          </div>
        </div>
      </div>

      {/* Section 3: 动态演示 */}
      <div className="section" id="demo">
        <div className="section-title"><span className="num">3</span>动态演示</div>
        <div className="section-subtitle">选择算法，逐步观察代码执行与图形变化</div>

        <div className="mode-switch">
          <button className={`mode-btn ${mode==='divide'?'active-divide':''}`} onClick={()=>setMode('divide')}>
            🔵 分治法 O(n log n)
          </button>
          <button className={`mode-btn ${mode==='brute'?'active-brute':''}`} onClick={()=>setMode('brute')}>
            🔴 蛮力法 O(n²)
          </button>
        </div>

        <AlgoPlayer mode={mode}/>

        <div className="card" style={{marginTop:20}}>
          <div className="card-header"><div className="dot" style={{background:'var(--cyan)'}}/>示例数据说明</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>
            <p>演示使用 6 个点：P0(2,3)、P1(3,7)、P2(5,1)、P3(6,5)、P4(8,6)、P5(9,2)</p>
            <p style={{marginTop:4}}>最终结果：最近点对为 <strong style={{color:'#4ade80'}}>P3(6,5) ↔ P4(8,6)</strong>，距离 = <strong style={{color:'#4ade80'}}>2.24</strong></p>
            <p style={{marginTop:4,color:'var(--text3)'}}>蛮力法需要 C(6,2)=15 次比较 | 分治法递归深度 2，仅约 9 次核心比较</p>
          </div>
        </div>
      </div>

      {/* Section 4: 鸽巢原理 */}
      <div className="section" id="pigeonhole">
        <div className="section-title"><span className="num">4</span>鸽巢原理</div>
        <div className="section-subtitle">为什么 Strip 合并阶段是 O(n) 而不是 O(n²)</div>

        <div className="card">
          <div style={{display:'flex',justifyContent:'center'}}>
            <PigeonholeDiagram/>
          </div>
        </div>

        <div className="flex-row" style={{marginTop:4}}>
          <div className="card">
            <div className="card-header"><div className="dot" style={{background:'#f59e0b'}}/>核心论证</div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:'24px'}}>
              <p><strong style={{color:'#fbbf24'}}>问题：</strong>Strip 中可能有 O(n) 个点，两两比较不是 O(n²) 吗？</p>
              <p style={{marginTop:8}}><strong style={{color:'#fbbf24'}}>回答：</strong>不是！因为对于每个点 p：</p>
              <p style={{paddingLeft:16}}>① 将 d×2d 区域划分为 8 个 d/2 × d/2 的格子</p>
              <p style={{paddingLeft:16}}>② 每个格子直径 = d/√2 &lt; d，所以最多含 1 个点</p>
              <p style={{paddingLeft:16}}>③ 排除 p 自身 → 最多检查 <strong style={{color:'#4ade80'}}>7 个候选点</strong></p>
              <p style={{marginTop:8}}><strong style={{color:'#4ade80'}}>结论：</strong>n 个点 × 常数 7 = O(7n) = O(n)</p>
            </div>
          </div>
          <div className="card">
            <div className="card-header"><div className="dot" style={{background:'#a855f7'}}/>递推关系求解</div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:'24px'}}>
              <p><strong style={{color:'#c084fc'}}>递推关系：</strong></p>
              <div style={{background:'var(--bg)',padding:'10px 16px',borderRadius:6,margin:'8px 0',fontFamily:'monospace',color:'#e2e8f0'}}>
                T(n) = 2·T(n/2) + O(n)
              </div>
              <p><strong style={{color:'#c084fc'}}>由主定理（Master Theorem）：</strong></p>
              <p style={{paddingLeft:16}}>a=2, b=2, f(n)=O(n)</p>
              <p style={{paddingLeft:16}}>n^(log_b(a)) = n^1 = n</p>
              <p style={{paddingLeft:16}}>f(n) = Θ(n) → Case 2</p>
              <div style={{background:'var(--bg)',padding:'10px 16px',borderRadius:6,margin:'8px 0',fontFamily:'monospace'}}>
                <span style={{color:'#4ade80',fontWeight:'bold'}}>T(n) = O(n log n)</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Section 5: 复杂度分析 */}
      <div className="section" id="complexity">
        <div className="section-title"><span className="num">5</span>复杂度分析</div>
        <div className="section-subtitle">理论复杂度对比与实际运行时间分析</div>

        <div className="card">
          <div className="card-header"><div className="dot" style={{background:'#06b6d4'}}/>增长曲线对比</div>
          <div style={{display:'flex',justifyContent:'center',paddingTop:8}}>
            <ComplexityChart/>
          </div>
        </div>

        <div className="card" style={{marginTop:4}}>
          <div className="card-header"><div className="dot" style={{background:'#3b82f6'}}/>具体数值对比</div>
          <ComplexityTable/>
          <p style={{fontSize:12,color:'var(--text3)',marginTop:10}}>
            * 操作次数为理论计算值。N=100万时，分治法比蛮力法快约 <strong style={{color:'#4ade80'}}>50,000 倍</strong>。
          </p>
        </div>

        <div className="card" style={{marginTop:4}}>
          <div className="card-header"><div className="dot" style={{background:'#f59e0b'}}/>实测增长比率验证</div>
          <div style={{fontSize:13,color:'var(--text2)',lineHeight:'24px'}}>
            <p><strong style={{color:'#fbbf24'}}>蛮力法：</strong>当 N 增长 10 倍时，运行时间增长约 <strong style={{color:'#fca5a5'}}>100 倍</strong>（符合 n² 特征）</p>
            <p style={{marginTop:4}}><strong style={{color:'#fbbf24'}}>分治法：</strong>当 N 增长 10 倍时，运行时间增长约 <strong style={{color:'#93c5fd'}}>11~13 倍</strong>（符合 n log n 特征）</p>
            <div style={{background:'var(--bg)',padding:'12px 16px',borderRadius:6,margin:'12px 0',fontFamily:'monospace',fontSize:12}}>
              <div style={{color:'#fca5a5'}}>蛮力法: N 1000→10000 (×10), Time ×98.7 ≈ ×100 ✓</div>
              <div style={{color:'#93c5fd',marginTop:4}}>分治法: N 1000→10000 (×10), Time ×11.5 ≈ ×13.3 ✓</div>
              <div style={{color:'#86efac',marginTop:4}}>理论: 10 × log₂(10000)/log₂(1000) ≈ 10 × 1.33 = 13.3</div>
            </div>
          </div>
        </div>
      </div>

      {/* Section 6: 实验总结 */}
      <div className="section" id="summary">
        <div className="section-title"><span className="num">6</span>实验总结</div>
        <div className="section-subtitle">实验结论与收获</div>

        <div className="card">
          <div style={{fontSize:13,color:'var(--text2)',lineHeight:'26px'}}>
            {[
              {icon:'✅', text:'蛮力法时间复杂度O(n²)，实测增长比率与理论完全吻合。'},
              {icon:'✅', text:'分治法时间复杂度O(n log n)，通过鸽巢原理保证Strip合并为O(n)。'},
              {icon:'✅', text:'两种方法在相同输入下返回相同的最近距离值，验证了分治法实现的正确性。'},
              {icon:'✅', text:'分治法在大规模数据(N=10⁶)下优势明显，比蛮力法快约50000倍。'},
              {icon:'✅', text:'通过逐步可视化演示，直观理解了分治法"分→治→合"的执行过程。'},
              {icon:'💡', text:'分治法的关键洞察：Strip区域中每个点最多只需检查7个相邻点，这是由鸽巢原理保证的。'},
            ].map((item,i)=>(
              <p key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <span style={{flexShrink:0}}>{item.icon}</span>
                <span>{item.text}</span>
              </p>
            ))}
          </div>
        </div>

        <div style={{textAlign:'center',padding:'30px 0 60px',color:'var(--text3)',fontSize:13}}>
          <p>— 实验二 · 分治法求最近点对问题 · 完 —</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
